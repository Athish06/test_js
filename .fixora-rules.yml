rules:
- id: fixora-wrapper-callback-router-get--api-admin-user-report
  patterns:
  - pattern-either:
    - pattern: <callback:router.get(/api/admin/user_report)> = (...) => { ... }
    - pattern: <callback:router.get(/api/admin/user_report)> = function(...) { ...
        }
  - pattern-either:
    - pattern: db.execute(...)
    - pattern: $OBJ.execute(...)
    - pattern: execute(...)
    - pattern: db.query(...)
    - pattern: $OBJ.query(...)
    - pattern: query(...)
  message: 'SQL Injection via `req.params.filename`

    Vulnerable Sink: Passes untrusted data directly to `db.execute, db.query`.'
  severity: ERROR
  languages: &id001
  - javascript
  - typescript
  metadata: &id002
    category: security
    technology:
    - javascript
    - typescript
    source: fixora-ai-analysis
    vulnerability_type: SQL Injection
    confidence: HIGH
    wrapper_defined_in: database.js
    wraps:
    - db.execute
    - db.query
    modules_used:
    - <object>.execute
    - <object>.query
    vulnerable_parameter: req.params.filename
    malicious_payload: admin' UNION SELECT password FROM credentials --
    exploit_explanation: The attacker-controlled username is concatenated into the
      SQL WHERE clause, allowing the payload to convert the predicate into an always-true
      condition.
    exploit_injected_example: <callback:router.get(/api/admin/user_report)>(req.params.filename
      = admin' UNION SELECT password FROM credentials --)
    impact_summary: Attackers can exfiltrate all rows from the table and bypass authorization
      checks tied to user scoping.
    cwe:
    - CWE-89
    owasp:
    - A03:2021
- id: fixora-taint-callback-router-get--api-admin-user-report
  mode: taint
  pattern-sources:
  - pattern: req.$W
  - pattern: request.$W
  - pattern: req.body.$W
  - pattern: req.query.$W
  - pattern: req.params.$W
  - pattern: window.location.$W
  - pattern: document.cookie
  - pattern: fetch(...)
  - pattern: axios(...)
  pattern-sinks:
  - pattern: <callback:router.get(/api/admin/user_report)>(...)
  - pattern: $OBJ.<callback:router.get(/api/admin/user_report)>(...)
  message: 'Taint tracked to vulnerable wrapper `<callback:router.get(/api/admin/user_report)>`.

    SQL Injection via `req.params.filename`

    Vulnerable Sink: Passes untrusted data directly to `db.execute, db.query`.'
  severity: ERROR
  languages: *id001
  metadata: *id002
